name: Olist Lakehouse CI

# When this workflow will run
on:
  push:
    branches: [ "main" ] # when I push code to main branch
    # SADECE su dosyalarda degisiklik olursa calis:
    paths:
      - 'sql/**'
      - 'scripts/**'
      - 'dashboard/*.py'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ] # when someone submits a pull request

jobs:
  # These 2 jobs will run in parallel.
  # 1st JOB: Check Python Code Style  
  python-linting:
    runs-on: ubuntu-latest # It runs on a virtual machine of Github with Ubuntu OS
    steps:
      - uses: actions/checkout@v3 # Copy the code from the repository to the virtual machine
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          
      - name: Install Linting Tools
        run: |
          pip install flake8 # Kod yazim kurallarini denetler
          
      - name: Run Python Lint
        run: |
          # Hatalari bulur ama islemi durdurmaz (şimdilik)
          # Girinti hatalari, unused imports vb. bakilir
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2nd JOB: Check SQL Files 
  sql-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install SQL Lint
        run: pip install sqlfluff # It is a SQL linter tool.
        
      - name: Lint SQL Files
        run: |
          # Sadece 'sql/' klasöründeki dosyaları denetle
          # Postgres kural setine göre bakar
          sqlfluff lint sql/ --dialect postgres